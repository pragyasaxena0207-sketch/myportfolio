<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Inventory Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🏪 Shop Inventory Manager</h1>
  <a href="../index.html" style="color:white; text-decoration:underline;">← Back to Portfolio</a>
</header>

  <main>
    <!-- Add Raw Material -->
    <section class="card">
      <h2>➕ Raw Material Received</h2>
      <form id="rawMaterialForm">
        <input type="text" id="rmName" placeholder="Item Name (e.g. Sugar)" required>
        <input type="number" id="rmQty" placeholder="Quantity" min="1" required>
        <input type="text" id="rmUnit" placeholder="Unit (kg, litre, pcs)" required>
        <button type="submit" class="btn add-btn">Add to Stock</button>
      </form>
    </section>

    <!-- Record a Sale -->
    <section class="card">
      <h2>🛒 Record a Sale</h2>
      <form id="saleForm">
        <input type="text" id="saleName" placeholder="Item Name Sold" required>
        <input type="number" id="saleQty" placeholder="Quantity Sold" min="1" required>
        <button type="submit" class="btn sale-btn">Record Sale</button>
      </form>
      <p id="saleMessage"></p>
    </section>

    <!-- Current Stock -->
    <section class="card">
      <h2>📦 Current Stock</h2>
      <table id="stockTable">
        <thead>
          <tr>
            <th>Item</th>
            <th>Quantity</th>
            <th>Unit</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="stockBody">
          <!-- Filled dynamically by JS -->
        </tbody>
      </table>
    </section>

    <!-- Transaction Log -->
    <section class="card">
      <h2>📝 Transaction History</h2>
      <ul id="logList"></ul>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Shop Inventory Manager — Deployed on Render</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
